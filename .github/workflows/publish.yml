name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'bin/**'
      - 'scripts/**'
      - 'package.json'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Auto Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Get current version
        id: version
        run: echo "current=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.version.outputs.current }}"
          new_version="${major}.${minor}.$((patch + 1))"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${new_version}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "new=${new_version}" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump to v${{ steps.bump.outputs.new }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin main --tags

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new }}" \
            --title "v${{ steps.bump.outputs.new }}" \
            --generate-notes
