name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - run: npm audit --audit-level=moderate || true
      - run: npm pack --dry-run

  test-install:
    name: Test Install (${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node }}
      - name: Test install script
        run: node scripts/install.mjs
      - name: Test CLI
        run: |
          node bin/claude-skills.mjs list
          node bin/claude-skills.mjs doctor
          node bin/claude-skills.mjs info k8s
      - name: Test uninstall script
        run: node scripts/uninstall.mjs
      - name: Verify clean uninstall
        run: |
          if [ -d "$HOME/.claude/skills/devops-deploy" ]; then
            echo "FAIL: skills not removed" && exit 1
          fi
          echo "PASS: clean uninstall"
